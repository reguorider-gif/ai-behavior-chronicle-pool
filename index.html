<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美加墨世界杯 · AI 预测池</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%2318273f'/%3E%3Ctext x='32' y='43' text-anchor='middle' font-size='34'%3E%F0%9F%8F%86%3C/text%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');

:root {
  --bg-page: #0c1222;
  --bg-card: #111827;
  --bg-card-hover: #1a2332;
  --bg-panel: rgba(17,24,39,0.96);
  --text-primary: #f1f5f9;
  --text-body: #dbe4f0;
  --text-muted: #b6c2d1;
  --text-faint: #a8b3c4;
  --blue: #3b82f6;
  --blue-soft: rgba(59,130,246,0.12);
  --cyan: #22d3ee;
  --red: #ef4444;
  --violet-soft: rgba(167,139,250,0.14);
  --green: #10b981;
  --green-soft: rgba(16,185,129,0.12);
  --orange: #f59e0b;
  --orange-soft: rgba(245,158,11,0.12);
  --gold: #eab308;
  --purple: #a78bfa;
  --color-success: #10b981;
  --color-danger: #ef4444;
  --color-warning: #f59e0b;
  --color-highlight: #eab308;
  --color-info: #38bdf8;
  --color-accent: #a78bfa;
  --line: rgba(148,163,184,0.12);
  --line-strong: rgba(148,163,184,0.22);
  --shadow: 0 4px 24px rgba(0,0,0,0.25);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --lh-body: 1.7;
  --sidebar-w: 300px;
  --content-max-w: 974px;
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 18px;
  --radius-pill: 999px;
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow-x:hidden}
body{
  font-family:var(--font);background:var(--bg-page);color:var(--text-body);
  line-height:var(--lh-body);min-height:100vh;font-size:14px;
  font-feature-settings:'cv11','cv02','cv03','cv04';
  transition:color 180ms ease, background-color 180ms ease;
  overflow-x:hidden;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;
  background:
    radial-gradient(circle at 18% 0%, rgba(34,211,238,0.12), transparent 28%),
    radial-gradient(circle at 92% 8%, rgba(234,179,8,0.10), transparent 24%),
    linear-gradient(180deg,#0b1020 0%,#0c1222 44%,#080d19 100%);
}

nav.topbar{
  position:sticky;top:0;z-index:300;
  background:rgba(12,18,34,0.88);
  backdrop-filter:blur(18px) saturate(1.3);
  -webkit-backdrop-filter:blur(18px) saturate(1.3);
  border-bottom:1px solid var(--line);height:56px;
  display:flex;align-items:center;padding:0 40px;justify-content:space-between;
}
.topbar-left{display:flex;align-items:center;gap:12px;min-width:0}
.topbar-pulse{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 2.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.25;transform:scale(1.35)}}
.topbar-title{font-size:14px;font-weight:700;letter-spacing:-0.02em;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-right{display:flex;gap:12px;align-items:center;flex-shrink:0}
.topbar-mark{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:10px;background:linear-gradient(135deg,rgba(59,130,246,0.95),rgba(167,139,250,0.95));box-shadow:0 8px 24px rgba(59,130,246,0.24);font-size:16px}
.run-pill{display:inline-flex;align-items:center;gap:6px;min-height:32px;border-radius:var(--radius-pill);border:1px solid var(--line);padding:0 12px;color:var(--text-muted);font-size:12px;font-weight:700;background:rgba(17,24,39,0.45)}
.run-pill strong{color:var(--green);font-weight:800}

.btn-icon{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:44px;min-height:44px;border-radius:var(--radius-sm);border:1px solid var(--line);
  background:transparent;color:var(--text-muted);cursor:pointer;
  font-size:14px;font-family:var(--font);transition:all 200ms var(--ease-out-expo);
}
.btn-icon:hover{border-color:var(--line-strong);color:var(--text-primary);background:rgba(17,24,39,0.5)}
.btn-icon.active{background:var(--blue-soft);border-color:var(--blue);color:var(--blue)}
button:focus-visible,[role="button"]:focus-visible,summary:focus-visible,a:focus-visible,
.date-chip:focus-visible,.match-card:focus-visible,.rank-row:focus-visible,.match-view-btn:focus-visible,
.sidebar-action:focus-visible,.detail-close:focus-visible,.btn-icon:focus-visible{
  outline:2px solid rgba(96,165,250,0.96);outline-offset:3px;
  box-shadow:0 0 0 5px rgba(59,130,246,0.2),0 10px 28px rgba(0,0,0,0.26);
}
.btn-text{font-size:12px;font-weight:600;letter-spacing:-0.01em;padding:0 16px;gap:4px}
.contact-wrap{position:relative}
.contact-btn{white-space:nowrap}
.contact-panel{
  position:absolute;right:0;top:52px;width:260px;z-index:500;
  background:rgba(17,24,39,0.98);border:1px solid var(--line-strong);
  border-radius:var(--radius-md);box-shadow:0 20px 60px rgba(0,0,0,0.38);
  padding:16px;color:var(--text-body)
}
.contact-panel[hidden]{display:none}
.contact-panel b{display:block;font-size:13px;color:var(--text-primary);margin-bottom:8px}
.contact-methods{display:grid;gap:10px;margin-bottom:8px}
.contact-method-label{font-size:12px;color:var(--text-faint);font-weight:800;margin-bottom:5px}
.contact-email,.contact-method-value{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  min-height:44px;border-radius:var(--radius-sm);background:rgba(59,130,246,0.08);
  border:1px solid rgba(59,130,246,0.18);padding:0 12px;
  color:var(--text-primary);font-size:12px;font-weight:800
}
.contact-email button,.contact-method-value button{
  border:0;background:transparent;color:var(--text-muted);cursor:pointer;
  min-width:44px;min-height:44px;font:inherit
}
.contact-panel a{display:inline-flex;align-items:center;min-height:44px;color:#93c5fd;text-decoration:none;font-size:12px;font-weight:800}
.contact-panel small{display:block;color:var(--text-faint);font-size:12px;line-height:1.55}

.layout{
  display:grid;grid-template-columns:var(--sidebar-w) minmax(0,1fr);
  max-width:calc(var(--sidebar-w) + var(--content-max-w) + 80px);
  margin:0 auto;padding:0 40px;min-height:calc(100vh - 56px);gap:48px;
}
.sidebar{
  padding-top:24px;padding-bottom:80px;position:sticky;top:76px;align-self:start;max-height:calc(100vh - 100px);overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:rgba(148,163,184,0.26) transparent;
}
.sidebar::-webkit-scrollbar{width:6px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.22);border-radius:999px}
.sidebar::-webkit-scrollbar-thumb:hover{background:rgba(148,163,184,0.36)}
.main-content{padding-top:24px;padding-bottom:80px;max-width:var(--content-max-w)}

.sidebar-brand{margin-bottom:28px}
.sidebar-brand-icon{width:48px;height:48px;border-radius:16px;background:
  linear-gradient(145deg,rgba(255,255,255,0.18),transparent 38%),
  linear-gradient(135deg,#2563eb,#7c3aed 62%,#f59e0b);
  display:flex;align-items:center;justify-content:center;font-size:23px;margin-bottom:12px;
  box-shadow:0 18px 40px rgba(37,99,235,0.22), inset 0 1px 0 rgba(255,255,255,0.25);
  position:relative;overflow:hidden;
}
.sidebar-brand-icon::after{content:"⚽";position:absolute;right:-3px;bottom:-4px;font-size:16px;filter:drop-shadow(0 3px 8px rgba(0,0,0,0.45))}
.sidebar-brand-name{font-size:18px;font-weight:850;letter-spacing:-0.04em;color:var(--text-primary);line-height:1.15}
.sidebar-brand-sub{margin-top:5px;font-size:12px;color:var(--text-faint);font-weight:600}

.sidebar-section{margin-bottom:28px}
.sidebar-kicker{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-faint);margin-bottom:12px}
.sidebar-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sidebar-stat{background:rgba(17,24,39,0.85);border-radius:var(--radius-sm);padding:16px 14px;cursor:pointer;transition:all 200ms var(--ease-out-expo);border:1px solid var(--line);min-width:0}
.sidebar-stat:hover{background:var(--bg-card-hover);transform:translateY(-1px);box-shadow:var(--shadow)}
.sidebar-stat-val{font-size:18px;font-weight:800;line-height:1.15;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;color:var(--text-primary);margin-bottom:4px}
.sidebar-stat-val.gold{color:var(--gold)}
.sidebar-stat-lbl{font-size:12px;color:var(--text-faint);font-weight:600;line-height:1.4}
.rank-list{display:flex;flex-direction:column;gap:4px}
.rank-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);min-height:44px;border:1px solid transparent;cursor:pointer}
.rank-row:hover{background:rgba(17,24,39,0.6);border-color:var(--line)}
.rank-row.selected{background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.38);box-shadow:inset 3px 0 0 var(--blue)}
.rank-pos{font-size:12px;font-weight:800;width:20px;color:var(--text-faint);font-variant-numeric:tabular-nums}
.rank-pos.top{color:var(--gold)}
.model-avatar{
  display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;
  width:30px;height:30px;border-radius:10px;font-size:13px;font-weight:850;color:white;
  background:linear-gradient(135deg,var(--avatar-a,#3b82f6),var(--avatar-b,#8b5cf6));
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.24),0 8px 18px rgba(0,0,0,0.18);
}
.model-avatar.sm{width:26px;height:26px;border-radius:9px;font-size:12px}
.model-avatar.lg{width:34px;height:34px;border-radius:12px;font-size:14px}
.rank-main{flex:1;min-width:0}
.rank-name{display:block;font-size:13px;font-weight:750;color:var(--text-body);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-tag{display:block;font-size:12px;color:var(--text-faint);line-height:1.2;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-gp{font-size:12px;font-weight:800;color:var(--text-muted);font-variant-numeric:tabular-nums}
.rank-side{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:58px}
.rank-trend{display:inline-flex;align-items:center;justify-content:center;min-height:20px;padding:0 7px;border-radius:999px;font-size:11px;font-weight:900;font-variant-numeric:tabular-nums;border:1px solid rgba(148,163,184,.14)}
.rank-trend.up{color:#bbf7d0;background:rgba(16,185,129,.11);border-color:rgba(16,185,129,.24)}
.rank-trend.down{color:#fecdd3;background:rgba(239,68,68,.10);border-color:rgba(239,68,68,.24)}
.rank-trend.flat{color:var(--text-faint);background:rgba(148,163,184,.08)}
.rank-alert{display:inline-flex;align-items:center;justify-content:center;min-height:18px;padding:0 6px;border-radius:999px;font-size:10px;font-weight:900;color:#fde68a;background:rgba(245,158,11,.10);border:1px solid rgba(245,158,11,.22);white-space:nowrap}

.sidebar-footer{margin-top:auto;padding-top:20px;border-top:1px solid var(--line)}
.sidebar-action{
  width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;
  min-height:44px;margin-bottom:14px;padding:0 14px;border-radius:var(--radius-sm);
  border:1px solid var(--line);background:rgba(17,24,39,0.62);color:var(--text-body);
  font-family:var(--font);font-size:12px;font-weight:850;cursor:pointer;
  transition:all 220ms var(--ease-out-expo);
}
.sidebar-action:hover{border-color:rgba(59,130,246,0.42);background:rgba(59,130,246,0.10);transform:translateY(-1px)}
.sidebar-action span:first-child{display:inline-flex;align-items:center;gap:8px}
.sidebar-action small{color:var(--text-faint);font-size:12px;font-weight:800}
.sidebar-footer-text{font-size:12px;color:var(--text-faint);font-weight:500;line-height:1.6}
.sidebar-footer-text span{color:var(--text-muted)}
.ops-link-row{display:flex;gap:8px;flex-wrap:wrap}
.ops-link{
  display:inline-flex;align-items:center;justify-content:center;min-height:36px;padding:0 12px;
  border-radius:var(--radius-sm);border:1px solid rgba(96,165,250,0.34);
  color:#bfdbfe;background:rgba(59,130,246,0.10);text-decoration:none;font-size:12px;font-weight:850;
}
.ops-link:hover{background:rgba(59,130,246,0.18);border-color:rgba(147,197,253,0.5)}

.main-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.main-header-title{font-size:22px;font-weight:850;letter-spacing:-0.04em;color:var(--text-primary)}
.round-verdict{
  border:1px solid rgba(96,165,250,.28);border-radius:var(--radius-lg);
  background:
    linear-gradient(135deg,rgba(59,130,246,.16),rgba(16,185,129,.07) 52%,rgba(234,179,8,.08));
  box-shadow:0 22px 54px rgba(0,0,0,.18);
  padding:20px;margin:0 0 18px;
}
.verdict-statement{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:14px;color:var(--text-muted);font-size:13px;font-weight:750}
.verdict-statement strong{font-size:22px;line-height:1;color:var(--text-primary);letter-spacing:-.04em}
.verdict-status{display:inline-flex;align-items:center;gap:8px;color:var(--text-primary)}
.verdict-status::before{content:"";width:9px;height:9px;border-radius:999px;background:var(--color-success);box-shadow:0 0 14px rgba(16,185,129,.72)}
.round-verdict.blocked .verdict-status::before{background:var(--color-warning);box-shadow:0 0 14px rgba(245,158,11,.64)}
.verdict-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.verdict-card{border:1px solid rgba(148,163,184,.14);border-radius:var(--radius-sm);background:rgba(2,6,23,.22);padding:12px 13px;min-width:0}
.verdict-card span{display:block;font-size:11px;color:var(--text-faint);font-weight:850;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.verdict-card strong{display:block;font-size:18px;color:var(--text-primary);line-height:1.15;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.behavior-nav{
  display:flex;gap:8px;flex-wrap:wrap;margin:-6px 0 18px;
  padding:6px;border:1px solid rgba(148,163,184,0.12);border-radius:var(--radius-md);
  background:rgba(12,18,34,0.36)
}
.behavior-nav-btn{
  min-height:38px;border:1px solid transparent;border-radius:var(--radius-sm);
  background:transparent;color:var(--text-muted);padding:0 12px;
  font:inherit;font-size:12px;font-weight:850;cursor:pointer;
  transition:all 180ms var(--ease-out-expo)
}
.behavior-nav-btn:hover{color:var(--text-body);background:rgba(148,163,184,0.08)}
.behavior-nav-btn.active{color:#bfdbfe;background:rgba(59,130,246,0.15);border-color:rgba(96,165,250,0.34)}
.behavior-page[hidden],.schedule-section[hidden]{display:none!important}

.date-swiper{display:flex;gap:8px;margin-bottom:28px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain}
.date-swiper::-webkit-scrollbar{display:none}
.date-chip{
  display:inline-flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 18px;border-radius:var(--radius-sm);border:1px solid transparent;
  background:transparent;color:var(--text-muted);cursor:pointer;
  font-family:var(--font);font-size:12px;font-weight:600;line-height:1.3;
  transition:all 200ms var(--ease-out-expo);min-width:72px;text-align:center;min-height:44px;justify-content:center;
}
.date-chip:hover{color:var(--text-body);border-color:var(--line)}
.date-chip.active{background:var(--blue-soft);border-color:transparent;color:var(--blue);font-weight:600}
.date-chip-day{font-size:18px;font-weight:800;letter-spacing:-0.03em;font-variant-numeric:tabular-nums}

.stat-ribbon{display:flex;gap:0;margin-bottom:48px;border:1px solid var(--line);border-radius:var(--radius-md);overflow:hidden}
.stat-cell{flex:1;text-align:center;padding:14px 12px;border-right:1px solid var(--line);background:rgba(17,24,39,0.3)}
.stat-cell:last-child{border-right:none}
.stat-cell.highlight{background:rgba(59,130,246,0.04)}
.stat-cell-val{font-size:16px;font-weight:850;line-height:1.15;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;color:var(--text-primary)}
.stat-cell-val.gold{color:var(--gold)}
.stat-cell-val.green{color:var(--green)}
.stat-cell-lbl{font-size:12px;color:var(--text-faint);font-weight:700;margin-top:4px;letter-spacing:0.02em}

.behavior-home{
  display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:18px;
  border:1px solid rgba(59,130,246,0.26);border-radius:var(--radius-lg);
  padding:18px;background:linear-gradient(135deg,rgba(59,130,246,0.13),rgba(16,185,129,0.06));
  box-shadow:0 18px 46px rgba(0,0,0,0.16)
}
.behavior-home h2,.behavior-card h2{font-size:18px;font-weight:850;letter-spacing:-0.035em;color:var(--text-primary);margin-bottom:8px}
.behavior-home > *,.behavior-card > *{min-width:0}
.behavior-home p,.behavior-card p{font-size:13px;color:var(--text-muted);line-height:1.65;overflow-wrap:anywhere}
.behavior-summary-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.behavior-kpi{border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px;background:rgba(12,18,34,0.42)}
.behavior-kpi b{display:block;color:var(--text-primary);font-size:17px;line-height:1.15;font-variant-numeric:tabular-nums}
.behavior-kpi span{display:block;margin-top:4px;color:var(--text-faint);font-size:12px;font-weight:750}
.behavior-key-list{display:grid;gap:8px}
.behavior-key-item{display:flex;gap:10px;align-items:flex-start;border:1px solid rgba(148,163,184,0.14);border-radius:var(--radius-sm);padding:10px;background:rgba(17,24,39,0.44);color:var(--text-body);font:inherit;text-align:left;cursor:pointer}
.behavior-key-item span{min-width:0;overflow-wrap:anywhere}
.behavior-key-item i{font-style:normal;display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:10px;background:rgba(59,130,246,0.12);color:#93c5fd;flex:0 0 auto}
.behavior-board{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;margin-bottom:16px}
.behavior-card{border:1px solid var(--line);border-radius:var(--radius-md);padding:18px;background:rgba(17,24,39,0.78)}
.replay-section{margin-bottom:16px}
.replay-shell{display:grid;gap:14px;margin-top:12px}
.replay-slider-row{display:grid;grid-template-columns:120px minmax(0,1fr) auto;gap:12px;align-items:center}
.replay-slider-label{font-size:12px;color:var(--text-faint);font-weight:850;text-transform:uppercase;letter-spacing:.04em}
.replay-slider{width:100%;accent-color:#38bdf8}
.replay-grid{display:grid;grid-template-columns:.9fr 1.15fr .95fr;gap:12px;align-items:start}
.replay-event-list{display:grid;gap:8px;max-height:360px;overflow:auto;padding-right:2px}
.replay-event-btn{border:1px solid rgba(148,163,184,.14);border-radius:var(--radius-sm);background:rgba(12,18,34,.36);color:var(--text-body);padding:10px;text-align:left;font:inherit;cursor:pointer}
.replay-event-btn.active{border-color:rgba(56,189,248,.5);background:rgba(56,189,248,.11)}
.replay-event-btn b{display:block;font-size:13px;color:var(--text-primary);margin-bottom:4px}
.replay-event-btn span{display:block;font-size:12px;color:var(--text-faint);line-height:1.4}
.replay-panel{border:1px solid rgba(148,163,184,.14);border-radius:var(--radius-sm);background:rgba(12,18,34,.34);padding:14px;min-height:180px}
.replay-panel h3{font-size:13px;color:var(--text-primary);margin-bottom:10px}
.replay-panel p{font-size:13px;color:var(--text-body);line-height:1.7;margin-bottom:10px}
.replay-mini-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}

const TEAM_ALIAS_LOOKUP = Object.fromEntries(Object.entries(TEAM_ALIASES).map(([alias, canonical])=>[teamAliasKey(alias), canonical]));

function teamAliasKey(value){
  return String(value || "")
    .normalize("NFKD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[’`]/g,"'")
    .trim()
    .toLowerCase()
    .replace(/&/g,"and")
    .replace(/[^a-z0-9]+/g," ");
}

function canonicalTeamName(teamName){
  const raw = String(teamName || "").trim();
  if(isPlaceholderTeamName(raw))return "TBD";
  return TEAM_ALIASES[raw] || TEAM_ALIAS_LOOKUP[teamAliasKey(raw)] || raw;
}

function isPlaceholderTeamName(teamName){
  return /^TBD(?:\b|$)/i.test(String(teamName || "").trim());
}

function teamZhName(teamName){
  if(isPlaceholderTeamName(teamName))return "待定";
  const canonical = canonicalTeamName(teamName);
  return TEAM_ZH[canonical] || canonical || "主队";
}

function isFullFlag(value){
  if(!value || typeof value !== "string")return false;
  if(value === "🏳️")return false;
  if(value === "🏴")return false;
  const codePoints = Array.from(value.trim());
  return codePoints.length >= 2;
}

function teamFlag(rawFlag, teamName){
  if(isPlaceholderTeamName(teamName))return "—";
  const canonical = canonicalTeamName(teamName);
  const mapped = TEAM_FLAGS[canonical];
  if(mapped)return mapped;
  return isFullFlag(rawFlag) ? rawFlag : "🏳️";
}

function isoToKey(iso){
  if(!iso || typeof iso !== "string")return iso;
  const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? `${Number(m[2])}/${Number(m[3])}` : iso;
}

function weekdayIndex(iso){
  const d = new Date(`${iso}T00:00:00Z`);
  return Number.isNaN(d.getTime()) ? 0 : d.getUTCDay();
}

function normalizeDatePayload(remote){
  const rows = Array.isArray(remote) ? remote : remote?.dates;
  if(!Array.isArray(rows) || !rows.length)return null;
  const todayIso = hkDateFromKickoff(new Date().toISOString());
  const dates = rows.map((row)=>{
    const iso = row.date || row.key || row.iso || "";
    const key = isoToKey(iso);
    return {
      key,
      iso,
      labelZh: iso ? `${Number(iso.slice(5,7))}月${Number(iso.slice(8,10))}日` : key,
      labelEn: iso ? new Date(`${iso}T00:00:00Z`).toLocaleDateString("en-US",{month:"short",day:"numeric",timeZone:"UTC"}) : key,
      wday: typeof row.wday === "number" ? row.wday : weekdayIndex(iso),
      count: row.count,
    };
  }).filter(d=>d.key);
  return {today: dates.find(d=>d.iso===todayIso)?.key || dates[0]?.key, dates};
}

function formatKickoff(value){
  if(!value)return "";
  const d = new Date(value);
  if(Number.isNaN(d.getTime()))return String(value).slice(11,16);
  return d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",hour12:false,timeZone:"Asia/Hong_Kong"});
}

function hkDateFromKickoff(value){
  if(!value)return "";
  const d = new Date(value);
  if(Number.isNaN(d.getTime()))return "";
  const parts = new Intl.DateTimeFormat("en-CA",{
    timeZone:"Asia/Hong_Kong",year:"numeric",month:"2-digit",day:"2-digit"
  }).formatToParts(d).reduce((acc,p)=>{acc[p.type]=p.value;return acc;},{});
  return parts.year && parts.month && parts.day ? `${parts.year}-${parts.month}-${parts.day}` : "";
}

function matchDateKeys(m){
  const keys = new Set();
  [m?.matchday_hk,m?.date_hk,m?.automation_date,m?.official_date,m?.date].forEach(v=>{
    if(v)keys.add(String(v).slice(0,10));
  });
  const hk = hkDateFromKickoff(m?.kickoff_at || m?.commence_time);
  if(hk)keys.add(hk);
  return Array.from(keys).filter(Boolean);
}

function matchBelongsToDate(m,targetIso){
  if(!targetIso)return true;
  return matchDateKeys(m).includes(targetIso);
}

function matchHasDateSignal(m){

}

function guardedMatchesForDate(rows,dateKey){
  if(!Array.isArray(rows) || !dateKey)return Array.isArray(rows) ? rows : [];
  const iso = isoForDateKey(dateKey);
  if(!iso)return rows;

  });
  if(!hasSignals)return rows;
  return rows.filter(m=>{
    const keys = Array.isArray(m?.dateKeys) ? m.dateKeys : matchDateKeys(m);
    return !keys.length || keys.includes(iso);
  });

function scoreDateKeys(row){

    if(value)keys.add(String(value).slice(0,10));

}

function knownScoreRows(){
  const rows=staticArtifacts.scoreSync?.known_scores;
  return Array.isArray(rows)?rows:[];
}

function findKnownScore(match){
  const rows=knownScoreRows();
  if(!rows.length || !match)return null;
  const matchId=String(match.match_id || match.id || "").trim();
  if(matchId){
    const direct=rows.find(row=>String(row.match_id || "").trim()===matchId);
    if(direct)return direct;
  }
  const home=normalizedTeamKey(match.home_team || match.home || match.home_name);
  const away=normalizedTeamKey(match.away_team || match.away || match.away_name);
  if(!home || !away)return null;
  const matchDates=new Set(matchDateKeys(match));
  return rows.find(row=>{
    const rowHome=normalizedTeamKey(row.home_team || row.home || row.home_name);
    const rowAway=normalizedTeamKey(row.away_team || row.away || row.away_name);
    if(rowHome!==home || rowAway!==away)return false;
    const rowDates=scoreDateKeys(row);
    if(!matchDates.size || !rowDates.length)return true;
    return rowDates.some(date=>matchDates.has(date));
  }) || null;
}

function applyKnownScore(match){
  const known=findKnownScore(match);
  if(!known)return match || {};
  const homeScore=Number(known.home_score);
  const awayScore=Number(known.away_score);
  if(!Number.isFinite(homeScore) || !Number.isFinite(awayScore))return match || {};
  const scoreText=known.score || `${homeScore}–${awayScore}`;
  const merged={
    ...(match || {}),
    home_score:homeScore,
    away_score:awayScore,
    score:scoreText,
    status:"settled",
    result_state:"finished",
    matchday_hk:known.matchday_hk || match?.matchday_hk,
    score_source:known.source || match?.score_source || "latest_score_sync",
    source_note:[match?.source_note,`score:${known.source || "score_sync"}`].filter(Boolean).join(" · "),
  };
  if(!merged.kickoff_at && known.kickoff_at)merged.kickoff_at=known.kickoff_at;
  return merged;
}

function isScoreValue(value){
  if(value === null || value === undefined || value === "")return false;
  return Number.isFinite(Number(value));
}

function normalizedScore(m){
  const raw = String(m?.score ?? "").trim();
  if(raw && !/null|undefined|nan/i.test(raw))return raw;
  if(isScoreValue(m?.home_score) && isScoreValue(m?.away_score)){
    return `${Number(m.home_score)}–${Number(m.away_score)}`;
  }
  return "";
}

function normalizeMatchStatus(m,score){
  const raw = String(m.status || "").toLowerCase();
  const result = String(m.result_state || "").toLowerCase();
  const hasScore = Boolean(score) || (isScoreValue(m.home_score) && isScoreValue(m.away_score));
  if(hasScore)return "done";
  if(["settled","finished","done","final","completed","closed"].includes(raw) || ["finished","settled","completed"].includes(result))return "result_pending";
  if(resultSyncDue(m))return "result_pending";
  if(["live","in_play","running","started"].includes(raw) || ["live","in_play","running"].includes(result))return "live";
  return "upcoming";
}

function matchMergeKey(match){

  if(id)return `id:${id}`;
  const home=normalizedTeamKey(match?.home_team || match?.home || match?.home_name);
  const away=normalizedTeamKey(match?.away_team || match?.away || match?.away_name);
  const date=(Array.isArray(match?.dateKeys)?match.dateKeys:matchDateKeys(match))[0] || "";
  return `teams:${home}:${away}:${date}`;
}

function mergeMatchRecord(base,incoming){
  if(!base)return incoming;
  if(!incoming)return base;
  const merged={...base,...incoming};
  const baseScore=normalizedScore(base);
  const incomingScore=normalizedScore(incoming);
  if(baseScore && !incomingScore){
    merged.score=base.score;
    merged.home_score=base.home_score;
    merged.away_score=base.away_score;
    merged.status=base.status;
    merged.result_state=base.result_state;
    merged.score_source=base.score_source;
  }
  if(incomingScore){
    merged.score=incoming.score;
    merged.home_score=incoming.home_score;
    merged.away_score=incoming.away_score;
    merged.status=incoming.status;
    merged.result_state=incoming.result_state;
    merged.score_source=incoming.score_source;
  }
  merged.odds={...(base.odds || {}),...(incoming.odds || {})};
  merged.market_snapshot=(incoming.market_snapshot || []).length >= (base.market_snapshot || []).length ? incoming.market_snapshot : base.market_snapshot;
  merged.dateKeys=Array.from(new Set([...(base.dateKeys || matchDateKeys(base)),...(incoming.dateKeys || matchDateKeys(incoming))])).filter(Boolean);
  return merged;
}

function mergeMatchLists(rows){

async function fetchJsonSafe(path){
  if(location.protocol === "file:" && !API_BASE)return null;
  const url = API_BASE ? new URL(path, API_BASE).toString() : path;
  for(const timeoutMs of [14000,22000]){
    const controller = new AbortController();
    const timer = setTimeout(()=>controller.abort(), timeoutMs);
    try{
      const res = await fetch(url,{cache:"no-store",signal:controller.signal});
      if(!res.ok)return null;
      const json = await res.json();
      if(!json || (typeof json === "object" && !Array.isArray(json) && Object.keys(json).length===0))return null;
      return json;
    }catch(_err){
      // Vercel cold starts occasionally exceed the first budget; retry once before showing an empty state.
    }finally{
      clearTimeout(timer);
    }
  }
  return null;
}

async function fetchStaticJson(path){
  const raw=String(path || "");
  const candidates=[];
  if(raw.startsWith("data/pool/"))candidates.push(`/${raw}`);
  candidates.push(path);
  if(path && !raw.startsWith("/")){
    candidates.push(`/${path}`);
    candidates.push(`../${path}`);
  }
  const seen=new Set();
  for(const candidate of candidates){
    if(!candidate || seen.has(candidate))continue;
    seen.add(candidate);
    try{
      const res = await fetch(candidate,{cache:"no-store"});
      if(!res.ok)continue;
      return await res.json();
    }catch(_err){
      // Try the next path candidate. Historical local reviews may still use legacy paths.
    }
  }
  return null;
}

function h2hOddsFromSnapshot(match){
  const rows=Array.isArray(match?.market_snapshot)?match.market_snapshot:[];
  const home=teamKey(match?.home_team || match?.home);
  const away=teamKey(match?.away_team || match?.away);
  const odds={h:"--",d:"--",a:"--"};
  rows.forEach(row=>{
    if(String(row?.market || "").toLowerCase()!=="h2h")return;
    const selection=teamKey(row.selection);
    if(selection==="draw" || selection==="tie")odds.d=row.odds;
    else if(selection && home && selection.includes(home))odds.h=row.odds;
    else if(selection && away && selection.includes(away))odds.a=row.odds;
  });
  return odds;
}

function normalizeSummary(raw,dateKey){
  const ranking = raw?.historical_ranking || raw?.current_ranking || raw?.ranking || raw?.rankings;
  const quality = raw?.quality_gate || staticArtifacts.qualityGate || {};
  const validSeats = Array.isArray(quality.valid_seats) ? quality.valid_seats.length : null;
  const needsSeats = Array.isArray(quality.needs_rerun) ? quality.needs_rerun.length : 0;
  const expectedSeats = requiredSeatCount(quality, raw?.summary, raw);
  const qualityRatio = validSeats !== null ? `${validSeats}/${Math.max(expectedSeats, validSeats + needsSeats)}` : null;
  if(Array.isArray(ranking) && ranking.length){
    const balances = ranking.map(r=>Number(r.balance_gp ?? r.gp ?? r.balance ?? 0)).filter(Number.isFinite);
    const total = balances.reduce((sum,n)=>sum+n,0);
    const loans = ranking.filter(r=>Number(r.loan_gp ?? r.loan ?? 0)>0).length;
    return {
      total_pool: total || 0,
      net_pl: raw?.net_pl || raw?.summary?.net_pl || "—",
      loan_seats: Number(raw?.loan_seats ?? raw?.summary?.loan_seats ?? loans ?? 0),
      verified_ratio: qualityRatio || raw?.verified_ratio || raw?.summary?.verified_ratio || `${ranking.length}/${expectedSeats}`,
      model_count: ranking.length,
    };
  }
  if(raw?.total_pool || raw?.summary?.total_pool){
    return {
      total_pool:Number(raw.total_pool ?? raw.summary.total_pool),
      net_pl:raw.net_pl || raw.summary?.net_pl || "—",
      loan_seats:Number(raw.loan_seats ?? raw.summary?.loan_seats ?? 0),
      verified_ratio:qualityRatio || raw.verified_ratio || raw.summary?.verified_ratio || `0/${expectedSeats}`,
      model_count:Number(raw.model_count ?? raw.summary?.model_count ?? expectedSeats),
    };
  }
  return null;
}

function dateSignatureOk(rows,dateKey){
  if(!["6/11","6/12","6/13","6/14"].includes(dateKey))return true;
  if(!Array.isArray(rows))return false;
  if(rows.some(m=>m?.score || m?.score_registry_applied || m?.registry_only))return true;
  if(dateKey === "6/11" && rows.length !== 2)return false;
  if(dateKey === "6/12" && rows.length < 4)return false;
  if(dateKey === "6/13" && rows.length < 6)return false;
  if(dateKey === "6/14" && rows.length < 4)return false;
  if(["6/12","6/13"].includes(dateKey) && rows.every(m=>m.status === "upcoming"))return false;
  const ids = rows.map(m=>String(m.id || m.match_id || "")).sort().join("|");
  if(dateKey === "6/11")return ids === "kor-cze|mex-rsa";
  if(dateKey === "6/12")return ids.includes("can-bih") && ids.includes("usa-par");
  if(dateKey === "6/13")return ids.includes("hti-sco") && ids.includes("usa-par");
  if(dateKey === "6/14")return (ids.includes("hti-sco") || ids.includes("WC-C1")) && (ids.includes("ger-cur") || ids.includes("WCAPI-20260614-GERMANY-CURA-AO") || rows.every(m=>m.status === "done"));
  return true;
}

function enforceDateSignature(rows,dateKey){
  const guarded = guardedMatchesForDate(rows,dateKey);
  if(dateSignatureOk(guarded,dateKey))return guarded;
  const recovery = recoveryMatchesForDate(dateKey);
  return recovery.length ? recovery : guarded;
}

function escapeRegExpText(value){
  return String(value || "").replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
}

function stripDiacritics(value){
  return String(value || "").normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function teamNameTextVariants(teamName){
  const canonical = canonicalTeamName(teamName);
  const variants = [teamName,canonical,stripDiacritics(teamName),stripDiacritics(canonical)];
  for(const [alias,target] of Object.entries(TEAM_ALIASES)){
    if(target === canonical){
      variants.push(alias,stripDiacritics(alias));
    }
  }
  return Array.from(new Set(variants.map(v=>String(v || "").trim()).filter(Boolean)));
}

function localizeTeamNamesInText(value,match){
  if(currentLang !== "zh")return String(value || "");
  let out = String(value || "");
  if(!out || !match)return out;
  const pairs = [
    {raw:match.home,zh:localizedTeam(match,"home")},
    {raw:match.away,zh:localizedTeam(match,"away")},
  ];
  for(const pair of pairs){
    if(!pair.zh)continue;
    for(const variant of teamNameTextVariants(pair.raw)){
      if(!variant || variant === pair.zh)continue;
      out = out.replace(new RegExp(escapeRegExpText(variant),"gi"),pair.zh);
    }
  }
  return out;
}

function isTeamNameOnly(value,teamName){
  const raw = String(value || "").trim().toLowerCase();
  const plain = stripDiacritics(raw);
  return teamNameTextVariants(teamName).some(variant=>{
    const candidate = String(variant || "").trim().toLowerCase();
    return raw === candidate || plain === stripDiacritics(candidate);
  });
}

function localizeReceiptSelection(value,match){
  const raw = String(value || "").trim();
  const key = teamKey(raw);
  if(currentLang !== "zh")return raw;
  if(!raw)return "";
  if(["draw","tie"].includes(key))return "平";
  if(["over","o"].includes(key))return "大";
  if(["under","u"].includes(key))return "小";
  if(match){
    if(isTeamNameOnly(raw,match.home))return localizedTeam(match,"home");
    if(isTeamNameOnly(raw,match.away))return localizedTeam(match,"away");
  }
  return localizeTeamNamesInText(raw,match);
}

function receiptMarketText(row,match,lang){
  const odds = Number(row?.odds || 0);
  const selection = lang === "zh" ? localizeReceiptSelection(row?.selection,match) : String(row?.selection || "").trim();
  const line = row?.line !== undefined && row?.line !== null && String(row.line) !== "" ? String(row.line) : "";
  const pick = [selection,line].filter(Boolean).join(" ");
  const market = pick || row?.market || "pick";
  return `${market}${odds ? " @ "+odds : ""}`;
}

function runtimeModelViews(matchId,match){
  const rows = runtimeRaw?.betting?.compact_decisions || [];
  if(!Array.isArray(rows) || !rows.length || !matchId)return null;
  const hits = rows.filter(r=>String(r.match_id || "")===String(matchId));
  if(!hits.length)return null;
  const settlementMap = settlementBySeatForMatch(matchId);
  const ranking = rankingRowsForDisplay();
  const seen = new Set();
  const models = hits.map((r,i)=>{
    const seatId = r.seat_id || r.model_account || "";
    const roundId = r.round_id || runtimeRoundLabel(runtimeRaw || {});
    const name = canonicalModelName(r.display_name || seatId,seatId);
    seen.add(name);
    const rankRow = ranking.find(item=>item.name===name) || {};
    const settlement = settlementMap.get(String(seatId || "").toLowerCase());
    const stake = settlement ? Number(settlement.stake_gp || 0) : Number(r.stake_gp || 0);
    const odds = Number(r.odds || 0);
    const projectedRet = Number.isFinite(odds) && odds > 0 ? Math.round(stake * Math.max(0, odds - 1)) : 0;
    const ret = settlement ? Number(settlement.payout_gp || 0) : projectedRet;
    const settledProfit = settlement ? Number(settlement.profit_gp || 0) : null;
    const marketSource = settlement ? {...r,...settlement,odds:settlement.odds || r.odds} : r;
    const noBet = String(r.action || "").toLowerCase() === "no_bet" || (!settlement && stake <= 0);
    const market = noBet ? "no-bet" : receiptMarketText(marketSource,match,"en");
    const marketZh = noBet ? "观望 / no-bet" : localizeTeamNamesInText(r.market_zh || receiptMarketText(marketSource,match,"zh"),match);
    const oneLine = (currentLang==='zh' ? localizeTeamNamesInText((r.one_line_zh || r.one_line_full || r.one_line),match) : (r.one_line_full || r.one_line)) || `${name}: ${market}`;
    const oneLineFull = (currentLang==='zh' ? localizeTeamNamesInText((r.one_line_zh || r.one_line_full || oneLine),match) : (r.one_line_full || oneLine));
    const reasonFull = currentLang==='zh' ? localizeTeamNamesInText((r.reason_full_zh || r.reason_full || r.reason_short_zh || r.reason_short || oneLineFull),match) : (r.reason_full || r.reason_short || oneLineFull);
    const riskFull = currentLang==='zh' ? localizeTeamNamesInText((r.risk_full_zh || r.risk_full || r.risk_short_zh || r.risk_short || ""),match) : (r.risk_full || r.risk_short || "");
    const resultSuffix = settlement
      ? (currentLang === "zh" ? `已结算：${gpSigned(settledProfit)}。` : `Settled: ${gpSigned(settledProfit)}.`)
      : "";
    return {
      pos:Number(rankRow.pos || i+1),
      seatId,
      roundId,
      name,
      gp:Number(rankRow.gp || 0),
      marketZh,
      marketEn:market,
      points:stake,
      ret,
      settlementProfit:settledProfit,
      settlementStatus:settlement?.status || "",
      status:settlement ? "active" : (noBet ? "pending" : "active"),
      confidence:Number(r.confidence ?? r.confidence_score ?? r.edge_confidence ?? r.probability ?? NaN),
      reasoning:{
        thinking:[reasonFull,resultSuffix].filter(Boolean).join(" "),
        judgment:settlement ? `${oneLineFull} ${resultSuffix}`.trim() : oneLineFull,
        risk:riskFull || (currentLang==='zh' ? "按本轮结构化回执展示；完整思考见席位档案。" : "Structured receipt view; full reasoning lives in the seat archive.")
      },
      archiveApi:r.seat_archive_api || `/api/pool/seat-archives/${encodeURIComponent(roundId)}/${encodeURIComponent(seatId)}`
    };
  });
  ranking.forEach((row)=>{
    if(seen.has(row.name))return;
    models.push({
      pos:row.pos,
      name:row.name,
      gp:row.gp,
      marketZh:"缺少本场投注",
      marketEn:"Missing this match",
      points:0,
      ret:0,
      status:"pending",
      confidence:NaN,
      reasoning:{
        thinking:currentLang==='zh' ? "该席位本轮有结构化回执，但未覆盖当前 match_id，已作为补跑缺口暴露。" : "This seat has a structured receipt, but this match_id is not covered and is flagged for repair.",
        judgment:currentLang==='zh' ? "需要定向补跑本场下注。" : "Targeted repair required for this match.",
        risk:currentLang==='zh' ? "缺口会影响全赛事策略和排名公平性。" : "The gap weakens full-slate fairness."
      }
    });
  });
  models.sort((a,b)=>a.pos-b.pos);
  const totalPoints=models.reduce((s,m)=>s+Number(m.points||0),0);
  const totalRet=models.filter(m=>m.ret>0).reduce((s,m)=>s+m.ret,0);
  const profitList=modelProfitList(models);
  return {models,totalPoints,totalRet,profitList};
}

function emptyModelViews(match){
  const ranking = rankingRowsForDisplay();
  const rows = ranking.length ? ranking : fallbackRankingRows();
  const homeName = currentLang === "zh" ? (match?.homeZh || teamZhName(match?.home)) : canonicalTeamName(match?.home);
  const awayName = currentLang === "zh" ? (match?.awayZh || teamZhName(match?.away)) : canonicalTeamName(match?.away);
  const gapText = currentLang === "zh"
    ? `${homeName || "本场"} vs ${awayName || "对手"} 没有真实结构化下注回执。前端不再生成模拟投注，SOP 巡检必须把缺口交给定向补跑。`
    : `${homeName || "This fixture"} vs ${awayName || "opponent"} has no real structured betting receipt. The UI no longer fabricates bets; SOP audit must route this to targeted rerun.`;

function observerSeatRowsForMatch(matchId,match){
  const ledger=observerLedgerForDate(activeDate);
  const rows=Array.isArray(ledger.seat_commentaries)?ledger.seat_commentaries:[];
  if(!rows.length)return [];
  const id=String(matchId || match?.match_id || match?.id || "");
  const home=teamKey(match?.home);
  const away=teamKey(match?.away);
  return rows.filter(row=>{
    if(id && String(row.main_match_id || "") === id)return true;
    const main=String(row.main_match || "");
    if(!main || !home || !away)return false;
    return teamKey(main).includes(home) && teamKey(main).includes(away);
  });
}

function getModelViews(matchId,match){
  const dynamic = runtimeModelViews(matchId,match);
  if(dynamic)return dynamic;
  const ledger = ledgerModelViews(matchId,match);
  if(ledger)return ledger;
  if(match)return emptyModelViews(match);
  return {models:[],totalPoints:0,totalRet:0,profitList:[]};
}

function normalizedConfidence(value){
  const n=Number(value);
  if(!Number.isFinite(n))return null;
  const pct=n > 0 && n <= 1 ? n * 100 : n;
  return Math.max(0,Math.min(100,Math.round(pct)));
}

function confidenceCell(value){
  const pct=normalizedConfidence(value);
  if(pct === null){
    return `<div class="confidence-cell"><span class="confidence-label">${currentLang==="zh"?"未记录":"Not recorded"}</span><div class="confidence-bar"><span class="confidence-fill" style="width:0%;"></span></div></div>`;

function excerptForTable(value,max){
  const raw=String(value || "").replace(/\s+/g," ").trim();
  return raw.length > max ? raw.slice(0,max-1)+"…" : raw;
}

function renderAiDecisionTable(models){
  const body=(Array.isArray(models)?models:[]).map(r=>{
    const pick=currentLang==="zh" ? r.marketZh : r.marketEn;
    const reason=excerptForTable(r.reasoning?.judgment || r.reasoning?.thinking || "",104);
    return `<tr>
      <td><span class="ai-decision-seat">${modelAvatar(r.name,'sm')}<span>${esc(r.name)}</span></span></td>
      <td><span class="ai-decision-pick" title="${esc(pick || "—")}">${esc(pick || "—")}</span></td>
      <td>${confidenceCell(r.confidence)}</td>
      <td style="font-weight:900;color:var(--text-primary);font-variant-numeric:tabular-nums">${Number(r.points || 0)>0?pointsText(r.points):"—"}</td>
      <td><div class="ai-decision-reason">${esc(reason || "—")}</div></td>
    </tr>`;
  }).join("");
  return `<table class="ai-decisions" aria-label="${esc(currentLang==="zh"?"AI 决策表":"AI decision table")}">
    <thead><tr><th>${currentLang==="zh"?"席位":"Seat"}</th><th>${currentLang==="zh"?"选择":"Pick"}</th><th>${currentLang==="zh"?"置信度":"Confidence"}</th><th>${currentLang==="zh"?"注码":"Stake"}</th><th>${currentLang==="zh"?"一句话理由":"One-line reason"}</th></tr></thead>

  </table>`;
}

function renderDecisionTable(models){

}

function genericMatchSummary(match,hName,aName,market){
  const pct = clampPercent(match.ai?.pct || 58);

function hasMarketValue(value){
  if(value === null || value === undefined)return false;
  const raw = String(value).trim();
  return raw !== "" && raw !== "--" && raw.toLowerCase() !== "null";
}

function formatMarketValue(value){
  const n = Number(value);
  if(!Number.isFinite(n) || n <= 0)return "—";
  return Number(n.toFixed(3)).toLocaleString(undefined,{maximumFractionDigits:3});
}

function clampPercent(value){
  const n=Number(value);
  if(!Number.isFinite(n))return 0;
  return Math.max(0,Math.min(100,Math.round(n)));
}

function hasFullWdlMarket(odds){
  return [odds?.h,odds?.d,odds?.a].every(hasMarketValue);
}

  if(!hasFullWdlMarket(odds))return null;

function localizedTeam(m, side){
  if(side === "away")return currentLang === "zh" ? (m.awayZh || teamZhName(m.away)) : canonicalTeamName(m.away);
  return currentLang === "zh" ? (m.homeZh || teamZhName(m.home)) : canonicalTeamName(m.home);
}

function teamBadgeText(m,side){

  const rawFlag=side === "away" ? (m?.af || m?.away_flag) : (m?.hf || m?.home_flag);
  return teamFlag(rawFlag, raw);
}

function selectionSide(row,m){
  const text = teamKey([row?.selection,row?.market,row?.line,row?.one_line,row?.reason_short].filter(Boolean).join(" "));
  const home = teamKey(m.home);
  const away = teamKey(m.away);
  if(home && text.includes(home))return "home";
  if(away && text.includes(away))return "away";
  return null;
}

function aiPreferenceLabel(m,receiptRows,expectedModels){
  if(receiptRows.length){
    const counts = receiptRows.reduce((acc,row)=>{
      const side = selectionSide(row,m);
      if(side)acc[side] += 1;
      return acc;
    },{home:0,away:0});
    const side = counts.away > counts.home ? "away" : "home";
    const maxVotes = Math.max(counts.home,counts.away);
    if(maxVotes > 0){
      return `${t('aiFavors')} ${localizedTeam(m,side)} ${clampPercent(maxVotes / Math.max(1,expectedModels) * 100)}%`;
    }
    return `${t('aiCoverage')} ${clampPercent(receiptRows.length / Math.max(1,expectedModels) * 100)}%`;
  }
  const aiPct = Number(m.ai?.pct);
  const prefSide = m.ai?.pref === "away" ? "away" : "home";
  if(Number.isFinite(aiPct) && aiPct > 0){
    return `${t('aiFavors')} ${localizedTeam(m,prefSide)} ${clampPercent(aiPct)}%`;
  }
  if(m.status === "done")return t('resultRecorded');
  if(resultSyncDue(m))return t('resultSyncPending');
  return t('modelPending');
}

function aiTendencyMeta(m,receiptRows,expectedModels){
  const label=aiPreferenceLabel(m,receiptRows,expectedModels);
  const pctMatch=String(label).match(/(\d{1,3})%/);
  let pct=pctMatch ? clampPercent(Number(pctMatch[1])) : 0;
  if(!pct && receiptRows.length)pct=clampPercent(receiptRows.length / Math.max(1,expectedModels) * 100);
  const cls=pct <= 0 ? "none" : (pct < 40 ? "low" : "strong");
  return {label,pct,cls};
}

function teamKey(value){
  return String(value || "")
    .toLowerCase()
    .replace(/&/g,"and")
    .replace(/[^a-z0-9]+/g,"");
}

function runtimeMatchCandidates(){
  const buckets = [
    runtimeRaw?.matches,
    runtimeRaw?.future_matches,
    runtimeRaw?.settled_matches,
    runtimeRaw?.archives?.matches,
    runtimeRaw?.archives?.future_matches,
    runtimeRaw?.archives?.settled_matches,
  ];
  return buckets.flatMap(x=>Array.isArray(x)?x:[]).filter(Boolean);
}

function runtimeMatchHasMarket(m){
  return hasMarketValue(m?.odds_home) || hasMarketValue(m?.odds_draw) || hasMarketValue(m?.odds_away);
}

function findRuntimeMatch(m){
  if(!runtimeRaw || !m)return null;
  const candidates = runtimeMatchCandidates().filter(runtimeMatchHasMarket);
  const id = String(m.match_id || m.id || "");
  const byId = candidates.find(x=>String(x.match_id || x.id || "") === id);
  if(byId)return byId;
  const home = teamKey(m.home);
  const away = teamKey(m.away);
  return candidates.find(x=>{
    const sameTeams = teamKey(x.home_team || x.home) === home && teamKey(x.away_team || x.away) === away;
    if(!sameTeams)return false;
    const sourceDate = String(x.date || x.official_date || x.matchday_hk || x.kickoff_at || "").slice(0,10);
    return !activeDate || !sourceDate || sourceDate === (DATE_TO_ISO[activeDate] || activeDate);
  }) || null;
}

function enrichMatchFromRuntime(m){
  const source = findRuntimeMatch(m);
  if(!source)return m;
  const odds = m.odds || {};
  const enriched = {
    ...m,
    odds:{
      h:hasMarketValue(odds.h) ? odds.h : formatMarketValue(source.odds_home),
      d:hasMarketValue(odds.d) ? odds.d : formatMarketValue(source.odds_draw),
      a:hasMarketValue(odds.a) ? odds.a : formatMarketValue(source.odds_away),
    },
  };
  if((!enriched.ai || !Number.isFinite(Number(enriched.ai.pct))) && source.prob_home !== null && source.prob_home !== undefined){
    enriched.ai = {pref:"home",pct:Math.round(Number(source.prob_home) * 100)};
  }
  return enriched;
}

function applyInitialDataCenterRoute(){
  const params=new URLSearchParams(location.search);
  const requestedDataView=params.get("view");
  if(dataCenterViewIds().includes(requestedDataView))activeDataCenterView=requestedDataView;
  const wantsDataCenter = params.get("dataCenter")==="1"
    || params.get("datacenter")==="1"
    || params.get("panel")==="data-center"
    || dataCenterViewIds().includes(requestedDataView)
    || location.hash==="#data-center";
  if(wantsDataCenter)openDataCenter();
}

async function init(){
  try{
    await loadStaticArtifacts();
    const datesData = await apiGetMatchDates();
    matchDates = datesData.dates;
    activeDate = requestedDateKey(matchDates) || datesData.today || datesData.dates[0]?.key;
    await Promise.all([loadMatches(), loadPoolSummary()]);
    lastRefreshFailed = !runtimeRaw && currentMatches.length === 0;
    renderAll();
    applyInitialDataCenterRoute();
  }catch(_err){
    lastRefreshFailed = true;
    renderAll();
    applyInitialDataCenterRoute();
  }
}

async function loadMatches(){
  const dateKey = activeDate;
  const {matches:list} = await apiGetMatches(dateKey);
  const enforced = enforceDateSignature(list,dateKey);
  if(dateKey === activeDate)currentMatches = enforced;
  return enforced;
}

async function loadPoolSummary(){
  const dateKey = activeDate;
  const result = await fetchPoolSummary(dateKey);
  if(dateKey === activeDate){
    runtimeRaw = result.raw;
    poolSummary = result.summary;
  }
  return result.summary;
}

  const observer=staticArtifacts.observerLedger || {};
  const scoreboard=observer.scoreboard || {};
  const status=gate.publish_allowed ? "READY" : (gate.status || sop.verdict || "PENDING");
  const validCount=Number(gate.valid_count ?? (Array.isArray(gate.valid_seats) ? gate.valid_seats.length : 0));
  const totalSeats=requiredSeatCount(gate,sop,staticArtifacts.behaviorSummary);
  const detailRows=Array.isArray(sop.shadow_rerun?.models_detail) ? sop.shadow_rerun.models_detail : [];
  const investmentRows=detailRows.flatMap(row=>Array.isArray(row.investments) ? row.investments : []);
  const betCount=investmentRows.length
    ? investmentRows.filter(row=>String(row.action || "").toLowerCase()==="bet").length
    : Number(scoreboard.accepted_bets || staticArtifacts.godReportV2?.action_counts?.bet || 0);
  const totalStake=investmentRows.length
    ? investmentRows.reduce((sum,row)=>sum+Number(row.stake_gp || 0),0)
    : Number(scoreboard.total_stake_gp || 0);
  const recoverySeats=detailRows.filter(row=>row.loan_terms?.recovery_mode).length;
  const needs=Array.isArray(gate.needs_rerun) ? gate.needs_rerun : [];
  const maxRisk=needs.length
    ? `${needs.length} ${currentLang==="zh"?"席待补跑":"rerun"}`
    : (recoverySeats ? `${recoverySeats} Recovery` : (currentLang==="zh"?"无硬阻塞":"No hard block"));

  el.classList.toggle("blocked",blocked);
  el.innerHTML=`
    <div class="verdict-statement">
      <span class="verdict-status">${currentLang==="zh"?"本轮裁决":"Round Verdict"}：<strong>${esc(compactStatus(status))}</strong></span>

      <div class="verdict-card"><span>${currentLang==="zh"?"总投入":"Stake"}</span><strong>${pointsText(totalStake)}</strong></div>
      <div class="verdict-card"><span>${currentLang==="zh"?"最大风险":"Top risk"}</span><strong>${esc(maxRisk)}</strong></div>

  `;
}

function agentProfileRows(){
  const profileSeats=staticArtifacts.agentProfiles?.seats || {};

  const rankRows=rankingRowsForDisplay();
  const ids=Array.from(new Set([
    ...PRODUCTION_SEATS,
    ...Object.keys(profileSeats),
    ...Object.keys(memorySeats),

  ])).filter(Boolean);
  return ids.map((seatId,index)=>{
    const profile=profileSeats[seatId] || memorySeats[seatId]?.profile || {};

    return {
      seat_id:seatId,
      display_name:displayNameForSeat(seatId),
      rank:Number(rank.pos || index+1),

      timeline_events:profile.timeline_events || memory.recent_timeline_events || [],

}

function profileLabel(value){
  const zh={
    leveraged_survival_player:"杠杆生存型",discipline_first_observer:"纪律观察型",aggressive_edge_hunter:"激进找边型",
    selective_allocator:"选择配置型",balanced_trader:"平衡交易型",observing:"观察中",
    high:"高",medium:"中",low:"低",guarded:"谨慎",unknown:"未知",
    aggressive_shift:"转向激进",risk_reduction:"风险收缩",loss_response_under_observation:"亏损后观察",stable:"稳定"
  };
  const en={
    leveraged_survival_player:"Leveraged survivor",discipline_first_observer:"Discipline first",aggressive_edge_hunter:"Aggressive edge hunter",
    selective_allocator:"Selective allocator",balanced_trader:"Balanced trader",observing:"Observing",
    high:"High",medium:"Medium",low:"Low",guarded:"Guarded",unknown:"Unknown",
    aggressive_shift:"Aggressive shift",risk_reduction:"Risk reduction",loss_response_under_observation:"Loss response",stable:"Stable"
  };
  return (currentLang==="zh"?zh:en)[value] || String(value || "—").replace(/_/g,' ');
}

function classToken(value){
  return String(value || "unknown").toLowerCase().replace(/[^a-z0-9_-]+/g,"_") || "unknown";
}

function riskBadge(level,label){
  const token=classToken(level);
  return `<span class="risk-badge ${token}">${esc(label || profileLabel(level))}</span>`;
}

function signedText(value,unit=""){
  const num=Number(value);
  if(!Number.isFinite(num) || num===0)return "";
  const sign=num>0?"+":"";
  return `${sign}${num}${unit}`;
}

function creditChangeText(event){
  const explicit=Number(event?.credit_change);
  if(Number.isFinite(explicit) && explicit!==0)return signedText(explicit);
  const before=Number(event?.state_before?.credit_score ?? event?.before?.credit_score);
  const after=Number(event?.state_after?.credit_score ?? event?.after?.credit_score);
  if(Number.isFinite(before) && Number.isFinite(after) && before!==after)return signedText(Math.round((after-before)*100)/100);
  return "";
}

function eventPatternText(event){
  const pattern=
    event?.pattern_triggered ||
    event?.triggered_pattern ||
    event?.state_after?.active_patterns?.[0]?.label ||
    event?.state_after?.active_patterns?.[0]?.name ||
    event?.state_before?.active_patterns?.[0]?.label ||
    event?.state_before?.active_patterns?.[0]?.name ||
    event?.decision_reconstruction?.memory_summary?.dominant_pattern;
  return pattern ? String(pattern) : "";
}

function eventMarketContextText(event){
  const count=event?.decision_reconstruction?.prompt_summary?.market_count;
  if(count!==undefined && count!==null)return currentLang==="zh" ? `市场 ${count} 个` : `${count} markets`;
  if(event?.market_context)return String(event.market_context);
  return "";
}

function behaviorNode(event,id){
  const action=event?.action || "observe";
  const outcome=event?.outcome || "pending";
  const shift=event?.risk_shift || "stable";
  const credit=creditChangeText(event);
  const parts=[
    action,
    outcome,
    profileLabel(shift) || shift,
    credit ? `${currentLang==="zh"?"信用":"credit"} ${credit}` : "",
  ].filter(Boolean);
  return `<button type="button" class="timeline-node" onclick="toggleTimelineDetail('${esc(id)}')" aria-controls="${esc(id)}">
    ${esc(parts.join(" · "))}
  </button>`;
}

function timelineDetail(event,id){
  const action=event?.action || "event";
  const outcome=event?.outcome || "—";
  const shift=event?.risk_shift || "stable";
  const stakeValue=event?.stake_gp ?? event?.state_after?.last_stake_gp;
  const loanValue=event?.loan_used_gp ?? event?.state_after?.last_loan_used_gp;
  const stake=stakeValue === undefined ? "" : `${currentLang==="zh"?"投入":"Stake"} ${pointsText(stakeValue)}`;
  const loan=loanValue === undefined ? "" : `${currentLang==="zh"?"贷款":"Loan"} ${pointsText(loanValue)}`;
  const pattern=eventPatternText(event);
  const market=eventMarketContextText(event);
  const credit=creditChangeText(event);
  const detail=[
    event?.run_id || "—",
    `${action} → ${outcome}`,
    `${currentLang==="zh"?"风险变化":"risk shift"}：${profileLabel(shift) || shift}`,
    credit ? `${currentLang==="zh"?"信用变化":"credit"}：${credit}` : "",
    pattern ? `${currentLang==="zh"?"触发模式":"pattern"}：${pattern}` : "",
    market ? `${currentLang==="zh"?"市场上下文":"market"}：${market}` : "",
    stake,
    loan,
  ]
    .filter(Boolean)
    .join(" · ");
  return `<div class="timeline-detail" id="${esc(id)}" hidden>${esc(detail)}</div>`;
}

function patternNode(pattern){
  const confidence=Math.max(0,Math.min(100,Math.round(Number(pattern?.confidence || 0)*100)));
  const seats=Array.isArray(pattern?.seats)?pattern.seats:[];
  const evidence=Array.isArray(pattern?.evidence)?pattern.evidence:[];
  return `<div class="pattern-item" data-pattern-node="${esc(pattern?.name || pattern?.label || "pattern")}">
    <b>${esc(pattern?.label || pattern?.name || "pattern")}</b>
    <div class="pattern-bar" aria-label="${confidence}%"><span style="width:${confidence}%"></span></div>
    <div class="pattern-meta"><span>${currentLang==="zh"?"置信度":"confidence"} ${confidence}%</span><span>${currentLang==="zh"?"支持事件":"support"} ${Number(pattern?.supporting_events || evidence.length || 0)}</span></div>
    ${seats.length?`<div class="pattern-sources">${seats.slice(0,6).map(seat=>`<span class="pattern-source-pill">${esc(displayNameForSeat(seat))}</span>`).join("")}</div>`:""}
    ${pattern?.note?`<p>${esc(pattern.note)}</p>`:""}
    ${evidence.length?`<div class="pattern-evidence">${evidence.slice(0,3).map(item=>esc(item.summary || item.event_id || JSON.stringify(item))).join("<br>")}</div>`:""}
  </div>`;
}

function renderCivilizationInteractionGraph(graph,battle){
  const nodes=graph?.nodes || [];
  const edges=graph?.edges || [];
  const byId=Object.fromEntries(nodes.map(node=>[node.id,node]));
  const edgeHtml=edges.map(edge=>{
    const from=byId[edge.from], to=byId[edge.to];
    if(!from || !to)return "";
    const dx=(Number(to.x || 0)-Number(from.x || 0))*100;
    const dy=(Number(to.y || 0)-Number(from.y || 0))*100;
    const len=Math.sqrt(dx*dx+dy*dy);
    const angle=Math.atan2(dy,dx)*180/Math.PI;
    const opacity=Math.max(.22,Math.min(.88,Number(edge.weight || 0)));
    return `<i class="civ-interaction-edge" style="left:${Number(from.x||0)*100}%;top:${Number(from.y||0)*100}%;width:${len}%;transform:rotate(${angle}deg);opacity:${opacity}"></i>`;
  }).join("");
  const nodeHtml=nodes.map(node=>`<button type="button" class="civ-interaction-node" style="left:${Number(node.x||.5)*100}%;top:${Number(node.y||.5)*100}%" title="${esc(node.state || "")}">
    <b>${esc(civilizationNameFromId(node.id,battle))}</b>
    <span>${esc(node.state || node.risk_level || "state")}</span>
  </button>`).join("");
  return `<div class="civ-interaction-space" aria-label="${currentLang==="zh"?"文明交互图":"Civilization interaction graph"}">
    ${edgeHtml}${nodeHtml || productEmpty(currentLang==="zh"?"文明交互图待生成。":"Interaction graph pending.")}
  </div>`;
}

function renderFateCurve(battle){
  const curves=(battle?.fate_curve || battle?.dynamics?.collapse_predictor?.fate_curve || []).slice(0,5);
  const width=420, height=210, pad=26;
  const innerW=width-pad*2, innerH=height-pad*2;
  const lines=curves.map((curve,index)=>{
    const points=(curve.points || []).map(point=>{
      const x=pad+(Number(point.t || 0)/4)*innerW;
      const y=pad+(1-Number(point.collapse_probability || 0))*innerH;
      return {x,y,p:point.collapse_probability};
    });
    const d=points.map((point,i)=>`${i?"L":"M"}${point.x.toFixed(1)} ${point.y.toFixed(1)}`).join(" ");
    const last=points[points.length-1] || {x:pad,y:pad};
    const label=civilizationNameFromId(curve.civilization_id,battle);
    return `<g>
      <path class="fate-line" d="${esc(d)}" stroke="${fateColor(index)}"></path>
      ${points.map(point=>`<circle class="fate-dot" cx="${point.x.toFixed(1)}" cy="${point.y.toFixed(1)}" r="4" fill="${fateColor(index)}"></circle>`).join("")}
      <text class="fate-label" x="${Math.min(width-116,last.x+7).toFixed(1)}" y="${Math.max(14,last.y-4).toFixed(1)}">${esc(label)}</text>
    </g>`;
  }).join("");
  return `<div class="fate-curve">
    <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="${currentLang==="zh"?"文明命运曲线":"Civilization fate curve"}">
      <line class="fate-curve-grid" x1="${pad}" y1="${pad}" x2="${pad}" y2="${height-pad}"></line>
      <line class="fate-curve-grid" x1="${pad}" y1="${height-pad}" x2="${width-pad}" y2="${height-pad}"></line>
      <text class="fate-label" x="4" y="18">${currentLang==="zh"?"崩溃风险":"Risk"}</text>
      <text class="fate-label" x="${width-56}" y="${height-8}">${currentLang==="zh"?"时间":"Time"}</text>
      ${lines || ""}
    </svg>
    ${!curves.length ? productEmpty(currentLang==="zh"?"文明命运曲线待生成。":"Fate curve pending.") : ""}
  </div>`;
}

function replayEvents(){
  const rows=Array.isArray(staticArtifacts.behaviorReplay?.timeline) ? staticArtifacts.behaviorReplay.timeline : [];
  return rows.filter(row=>row && row.event_id);
}

function setReplayEventIndex(index){
  const rows=replayEvents();
  activeReplayIndex=Math.max(0,Math.min(rows.length-1,Number(index || 0)));
  renderBehaviorReplay();
}

function replayValue(state,key){
  if(!state)return "—";
  const value=state[key];
  if(value===undefined || value===null || value==="")return "—";
  if(["balance_gp","outstanding_loan_gp","accrued_interest_gp","net_worth_gp","last_stake_gp","last_loan_used_gp","last_profit_gp"].includes(key))return pointsText(value);
  if(["risk_level","behavior_type","loan_dependency","strategy_drift"].includes(key))return profileLabel(value);
  return String(value);
}

function replayStateDiff(before,after){
  const rows=[
    ["Credit","credit_grade"],
    [currentLang==="zh"?"信用分":"Score","credit_score"],
    [currentLang==="zh"?"净值":"Net worth","net_worth_gp"],
    [currentLang==="zh"?"贷款":"Loan","outstanding_loan_gp"],
    [currentLang==="zh"?"风险":"Risk","risk_level"],
    [currentLang==="zh"?"类型":"Type","behavior_type"],
  ];
  return `<div class="replay-state-diff">${rows.map(([label,key])=>`
    <div class="replay-state-row"><span>${esc(label)}</span><b>${esc(replayValue(before,key))}</b><b>→ ${esc(replayValue(after,key))}</b></div>
  `).join("")}</div>`;
}

function renderBehaviorReplay(){
  const el=document.getElementById('behaviorReplay');
  if(!el)return;
  const rows=replayEvents();
  if(!rows.length){
    el.innerHTML=`<h2>${currentLang==="zh"?"行为时间机器":"Behavior Time Machine"}</h2>${productEmpty(currentLang==="zh"?"回放数据待生成。":"Replay data pending.")}`;
    return;

  activeReplayIndex=Math.max(0,Math.min(rows.length-1,activeReplayIndex));
  const active=rows[activeReplayIndex];
  const reconstruction=active.decision_reconstruction || {};
  const promptSummary=reconstruction.prompt_summary || {};
  const memorySummary=reconstruction.memory_summary || {};
  const counter=active.counterfactual || {};
  const before=active.state_before || {};

  const displaySeat=displayNameForSeat(active.seat_id);

  el.innerHTML=`

      </div>
      <div class="replay-grid">
        <div class="replay-panel">
          <h3>${currentLang==="zh"?"事件时间轴":"Event Timeline"}</h3>
          <div class="replay-event-list">
            ${listRows.map((row,idx)=>`<button type="button" class="replay-event-btn ${idx===activeReplayIndex?'active':''}" onclick="setReplayEventIndex(${idx})">

          <h3>${currentLang==="zh"?"决策时刻":"Decision Moment"}</h3>

function renderAccountCurve(rows){
  const topRows = rows.slice(0,6);
  const values = topRows.map(r=>Number(r.gp)||0);
  const max = Math.max(...values,1000);
  const min = Math.min(...values,1000);
  const span = Math.max(1,max-min);
  const points = values.map((v,i)=>{
    const x = 20 + i * (260 / Math.max(1,values.length-1));
    const y = 130 - ((v-min)/span)*96;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const area = points ? `20,150 ${points} 280,150` : "";
  return `
    <div class="mini-chart" aria-label="${esc(t('accountCurve'))}">
      <svg viewBox="0 0 300 170" role="img">
        <defs>
          <linearGradient id="curveStroke" x1="0" x2="1" y1="0" y2="0">
            <stop offset="0" stop-color="#facc15"/><stop offset="0.5" stop-color="#22d3ee"/><stop offset="1" stop-color="#10b981"/>

          <linearGradient id="curveFill" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="rgba(34,211,238,.26)"/><stop offset="1" stop-color="rgba(16,185,129,0)"/>

        <line class="chart-axis" x1="20" y1="130" x2="280" y2="130"></line>
        ${area?`<polygon class="chart-area" points="${area}"></polygon><polyline class="chart-line" points="${points}"></polyline>`:""}
        ${values.map((v,i)=>{
          const x = 20 + i * (260 / Math.max(1,values.length-1));
          const y = 130 - ((v-min)/span)*96;
          return `<circle class="chart-dot" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4"></circle>`;

function markdownInline(value){
  return esc(value).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
}

function markdownToHtml(markdown){
  const lines=String(markdown || "").split(/\r?\n/);
  const out=[];
  let list=[];
  const flushList=()=>{
    if(list.length){
      out.push(`<ul>${list.map(item=>`<li>${markdownInline(item)}</li>`).join("")}</ul>`);
      list=[];
    }
  };
  lines.forEach(line=>{
    const raw=String(line || "").trim();
    if(!raw){flushList();return;}
    const heading=raw.match(/^(#{1,4})\s+(.+)$/);
    if(heading){
      flushList();
      const level=heading[1].length <= 2 ? "h3" : "h4";
      out.push(`<${level}>${markdownInline(heading[2])}</${level}>`);
      return;
    }
    const bullet=raw.match(/^[-*]\s+(.+)$/);
    if(bullet){
      list.push(bullet[1]);
      return;
    }
    flushList();
    out.push(`<p>${markdownInline(raw)}</p>`);
  });
  flushList();
  return out.join("");
}

/* ==================================================================
   DATE SWITCHING
   ================================================================== */
async function switchDate(key){
  closeDetail();
  closeDataCenter();
  if(key===activeDate && !isRefreshing)return;
  const seq=++refreshSeq;
  activeDate=key;
  isRefreshing=true;
  renderLoadingState();
  const minLoadingDelay=new Promise(resolve=>setTimeout(resolve,220));
  try{
    const [matchResult,poolResult] = await Promise.all([apiGetMatches(key), fetchPoolSummary(key), minLoadingDelay]);
    if(seq!==refreshSeq)return;
    currentMatches = enforceDateSignature(matchResult.matches,key);
    runtimeRaw = poolResult.raw;
    poolSummary = poolResult.summary;
    lastRefreshFailed=false;
  }catch(_err){
    await minLoadingDelay;
    if(seq!==refreshSeq)return;
    currentMatches = [];
    runtimeRaw = null;
    poolSummary = {total_pool:0,net_pl:"—",loan_seats:0,verified_ratio:`0/${REQUIRED_SEAT_COUNT}`,model_count:REQUIRED_SEAT_COUNT};
    lastRefreshFailed=true;
  }finally{
    if(seq===refreshSeq){
      isRefreshing=false;
      renderAll();
    }
  }
}

function openModelFromRank(encodedName){
  const name=decodeURIComponent(encodedName || "");
  const match=currentMatches[0];
  if(!match)return;
  openDetail(match.id);
  window.setTimeout(()=>{
    const rows=Array.from(document.querySelectorAll('#detailPanel .model-row'));
    const row=rows.find(item=>item.querySelector('.model-row-name')?.textContent.trim()===name);
    if(!row){
      document.getElementById('detailPanel')?.scrollTo({top:0,behavior:'smooth'});
      return;
    }
    row.scrollIntoView({behavior:'smooth',block:'center'});
    row.click();
  },120);
}

function archiveValue(value,fallback='—'){
  if(value === null || value === undefined || value === '')return fallback;
  return String(value);
}

function renderSeatArchive(data){
  if(!data || data.missing)return `<div class="seat-archive-title">${currentLang==='zh'?'档案暂不可用':'Archive unavailable'}</div>`;
  const account=data.account || {};
  const loan=data.loan_decision || {};
  const response=data.game_response || {};
  const responseZh=data.game_response_zh || {};
  const bets=Array.isArray(data.bets)?data.bets:[];
  const title=`${archiveValue(data.display_name || data.seat_id)} · ${archiveValue(data.round_id)}`;
  const analysisText=zhDisplay(data.analysis_summary_zh,data.analysis_summary,currentLang==='zh'?'该席位已提交结构化投注策略；原始输出保留在审计档案。':'');
  const riskText=zhDisplay(data.risk_summary_zh,data.risk_summary,currentLang==='zh'?'主要风险来自临场阵容、赔率波动和单场结果不确定性。':'');
  const strategyParts=[
    zhDisplay(responseZh.rank_strategy,response.rank_strategy,currentLang==='zh'?'结合当前排名和资金压力制定本轮策略。':''),
    zhDisplay(responseZh.reward_strategy,response.reward_strategy,currentLang==='zh'?'前五名奖励和末三位惩罚会影响仓位选择。':''),
    zhDisplay(responseZh.loan_strategy,response.loan_strategy,currentLang==='zh'?'贷款仅在预期回报覆盖利息与回撤风险时使用。':''),
    zhDisplay(responseZh.audience_pressure_response,response.audience_pressure_response,currentLang==='zh'?'公开排名压力要求该席位给出可解释的投注判断。':''),
  ].filter(Boolean);
  return `<div class="seat-archive-title">${esc(title)}</div>
    <div class="seat-archive-grid">
      <div class="seat-archive-pill"><span>${currentLang==='zh'?'排名/余额':'Rank / balance'}</span><b>#${esc(archiveValue(account.rank))} · ${esc(archiveValue(account.balance_gp))} GP</b></div>
      <div class="seat-archive-pill"><span>${currentLang==='zh'?'贷款':'Loan'}</span><b>${esc(archiveValue(loan.amount || account.loan_gp || 0))} GP</b></div>
      <div class="seat-archive-pill"><span>${currentLang==='zh'?'投注数':'Bets'}</span><b>${bets.length}</b></div>
      <div class="seat-archive-pill"><span>${currentLang==='zh'?'状态':'Status'}</span><b>${esc(archiveValue(data.status_label || data.state))}</b></div>
    </div>
    ${analysisText?`<div class="archive-section"><h4>${currentLang==='zh'?'总体策略':'Overall strategy'}</h4><p>${esc(analysisText)}</p></div>`:''}
    ${strategyParts.length?`<div class="archive-section"><h4>${currentLang==='zh'?'游戏压力回应':'Game pressure response'}</h4><ul>${strategyParts.map(part=>`<li>${esc(part)}</li>`).join('')}</ul></div>`:''}
    ${bets.length?`<div class="archive-section"><h4>${currentLang==='zh'?'本轮下注':'Round bets'}</h4><ul>${bets.map(b=>{
      const rawPick=[b.selection,b.line].filter(v=>v!==undefined&&v!==null&&String(v)!=='').join(' ') || archiveValue(b.market,'pick');
      const pick=currentLang==='zh' ? (b.market_zh || rawPick) : rawPick;
      const reason=zhDisplay(b.rationale_zh,b.rationale,'');
      return `<li class="archive-bet-item"><b>${esc(archiveValue(b.match_id))}</b> · ${esc(pick)} · ${esc(archiveValue(b.stake_gp || b.stake))} GP${reason?`<br><span>${esc(reason)}</span>`:''}</li>`;
    }).join('')}</ul></div>`:''}
    ${riskText?`<div class="archive-section"><h4>${currentLang==='zh'?'风险':'Risk'}</h4><p>${esc(riskText)}</p></div>`:''}
    ${loan.repayment_plan || loan.stop_loss?`<div class="archive-section"><h4>${currentLang==='zh'?'还款/止损':'Repayment / stop-loss'}</h4><p>${esc([loan.repayment_plan,loan.stop_loss].filter(Boolean).join(' '))}</p></div>`:''}`;
}

async function openSeatArchive(roundId,seatId,targetId,event){
  if(event)event.stopPropagation();

  target.hidden=false;
  target.innerHTML=`<div class="seat-archive-title">${currentLang==='zh'?'正在读取完整档案…':'Loading full archive…'}</div>`;
  const data=await fetchJsonSafe(`/api/pool/seat-archives/${encodeURIComponent(roundId)}/${encodeURIComponent(seatId)}`);
  target.innerHTML=renderSeatArchive(data);
  target.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function toggleModelDetail(matchId,i,hasReasoning){
  if(!hasReasoning)return;
  const detail=document.getElementById('mDetail-'+matchId+'-'+i);
  if(!detail)return;
  const row=document.getElementById('mRow-'+matchId+'-'+i);
  const isOpen=detail.classList.contains('show');
  document.querySelectorAll('.model-detail.show').forEach(d=>d.classList.remove('show'));
  document.querySelectorAll('.model-row.expanded').forEach(r=>r.classList.remove('expanded'));
  if(!isOpen){detail.classList.add('show');row.classList.add('expanded');detail.scrollIntoView({behavior:'smooth',block:'nearest'});}
}
